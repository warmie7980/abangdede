<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropdown Menu</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #000;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Courier New", monospace;
}

/* Kotak utama */
.dropdown-box {
    background-color: #111;
    border: 2px solid #00ff00;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}

/* Judul */
.dropdown-box h2 {
    color: #ffd700;
    margin-bottom: 15px;
}

/* Dropdown */
select {
    width: 250px;
    padding: 10px;
    font-size: 16px;
    font-family: "Courier New", monospace;
    background-color: #000;
    color: #fff;
    border: 1px solid #00ff00;
    border-radius: 5px;
    cursor: pointer;
}

select:focus {
    outline: none;
    border-color: #ffd700;
}
</style>
</head>
<body>

<div class="dropdown-box">
    <h2>PILIH MENU</h2>

    <select>
        <option value="">-- Pilih Menu --</option>
        <option>MIE JEBEW</option>
        <option>MIE YAMIN</option>
        <option>MIE ORIGINAL</option>
    </select>
</div>

</body>
</html>
