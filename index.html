<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARMIE</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #000;
    color: white;
    font-family: Arial, sans-serif;
    min-height: 100vh;
}

/* HEADER */
header {
    background-color: #111;
    padding: 30px;
    border-bottom: 1px solid #333;
    text-align: right;
}

.judul {
    font-family: "Courier New", monospace;
    font-size: 40px;
    color: #ffffff;
    margin: 0;
}

.subjudul {
    font-family: "Courier New", monospace;
    font-size: 60px;
    color: #a9a9a9;
    margin: 0;
}

/* ISI HALAMAN */
main {
    height: calc(100vh - 150px);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* KOTAK DROPDOWN */
.dropdown-box {
    background-color: #111;
    border: 2px solid #00ff00;
    padding: 30px;
    border-radius: 10px;
    text-align: center;

    transform: translateY(-75px);
}

.dropdown-box h2 {
    color: #ffd700;
    margin-bottom: 15px;
    font-family: "Courier New", monospace;
}

select {
    width: 250px;
    padding: 10px;
    font-size: 16px;
    font-family: "Courier New", monospace;
    background-color: #000;
    color: #fff;
    border: 1px solid #00ff00;
    border-radius: 5px;
    cursor: pointer;
}

select:focus {
    outline: none;
    border-color: #ffd700;
}
.footer-section {
    margin-top: 50px;
    text-align: center;
}

.footer-section hr {
    width: 500px;
    border: 0;
    border-top: 1px solid #555;
    margin: 0 auto 15px auto;
}

.footer-section p {
    color: #888;
    font-family: "Courier New", monospace;
    font-size: 14px;
}
</style>
</head>
<body>

<header>
    <h1 class="judul">WARMIE</h1>
    <h1 class="subjudul">ABANG-DEDE REBORN</h1>
</header>

<main>
    <div class="dropdown-box">
        <h2>PILIH MENU</h2>

        <select>
            <option>-- Pilih Menu --</option>
            <option>MIE JEBEW</option>
            <option>MIE YAMIN</option>
            <option>MIE ORIGINAL</option>
        </select>
    </div>
<div class="footer-section">
    <hr>
    <p>
        © 2026 Warmie Abang-Dede Reborn, Petir, Cipondoh, Tangerang-Banten
    </p>
</div>
</main>

</body>
</html>
