<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARMIE</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #000;
    color: white;
    font-family: Arial, sans-serif;
    min-height: 100vh;
}

/* HEADER */
header {
    background-color: #111;
    padding: 30px;
    border-bottom: 1px solid #333;
    text-align: right;
}

.judul {
    font-family: "Courier New", monospace;
    font-size: 40px;
    color: #ffffff;
    margin: 0;
}

.subjudul {
    font-family: "Courier New", monospace;
    font-size: 60px;
    color: #a9a9a9;
    margin: 0;
}

/* ISI HALAMAN */
main {
    height: calc(100vh - 150px);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* KOTAK DROPDOWN */
.dropdown-box {
    background-color: #111;
    border: 2px solid #00ff00;
    padding: 30px;
    border-radius: 10px;
    text-align: center;    
    margin-top: 80px;    
}

.dropdown-box h2 {
    color: #ffd700;
    margin-bottom: 15px;
    font-family: "Courier New", monospace;
}

select {
    width: 250px;
    padding: 10px;
    font-size: 16px;
    font-family: "Courier New", monospace;
    background-color: #000;
    color: #fff;
    border: 1px solid #00ff00;
    border-radius: 5px;
    cursor: pointer;
}

select:focus {
    outline: none;
    border-color: #ffd700;
}
.footer-section {
    width: 500px;
    margin-top: 50px;
    text-align: center;
}

.footer-section hr {
    border: none;
    border-top: 1px solid #555;
    margin-bottom: 15px;
}

.footer-section p {
    color: #888;
    font-family: "Courier New", monospace;
    font-size: 14px;
}
.info-box {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 350px;
    background: #111;
    border: 2px solid #00ff00;
    padding: 20px;
    text-align: center;
    z-index: 9999;
    border-radius: 10px;
    font-family: "Courier New", monospace;
}

.info-box h3 {
    color: #ffd700;
    margin-bottom: 10px;
}

.info-box p {
    color: #fff;
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 15px;
}

.info-box {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 350px;
    background: #111;
    border: 2px solid #00ff00;
    padding: 20px;
    text-align: center;
    z-index: 9999;
    border-radius: 10px;
    font-family: "Courier New", monospace;
}

.info-box button:hover {
    background: #00bfff;
}
.overlay-box {
    width: 600px;
    max-width: 90%;
    padding: 40px;
    background: #111;
    border: 2px solid #00ff00;
    text-align: center;
    border-radius: 10px;
    font-family: "Courier New", monospace;
}

/* kotak utama */
.overlay-box {
    width: 400px;
    background: #111;
    border: 2px solid #00ff00;
    padding: 25px;
    text-align: center;
    border-radius: 10px;
    font-family: "Courier New", monospace;
}

.overlay-box h2 {
    color: #ffd700;
    margin-bottom: 15px;
}

.overlay-box p {
    color: #fff;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
}

.overlay-box button {
    padding: 10px 25px;
    background: #1e90ff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.overlay-box button:hover {
    background: #00bfff;
}
</style>
</head>
<body>
<div class="info-box" id="infoBox">
    <h3>📢 MEDIA INFORMASI</h3>
    <p>
        Selamat datang di WARMIE!  
        Silakan pilih menu yang tersedia untuk melihat aneka makanan kami.
    </p>

    <button onclick="tutupInfo()">OK</button>
</div>
</div>

<header>
    <h1 class="judul">WARMIE</h1>
    <h1 class="subjudul">ABANG-DEDE REBORN</h1>
</header>

<main>

    <div class="dropdown-box">
        <h2>PILIH MENU</h2>

        <select id="menuSelect" onchange="pilihMenu()">
    <option value="">-- Pilih Menu --</option>
    <option value="https://warmie7980.github.io/abangdede-reborn/index.html">
    WARMIE/ANEKA MIE
    <option value="https://warmie7980.github.io/abangdede-reborn/nasiuduk.html">
    WARUNG EMAK
</option>
</select>
    </div>

    <div class="footer-section">
        <hr>
        <p>
            © 2026 Warmie Abang-Dede Reborn, Petir, Cipondoh, Tangerang-Banten
        </p>
    </div>

</main>
<script>
function pilihMenu() {
    const menu = document.getElementById("menuSelect").value;

    if (menu !== "") {
        window.location.href = menu;
    }
}
</script>
</body>
</html>
