<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARMIE</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #000;
    color: white;
    font-family: Arial, sans-serif;
    min-height: 100vh;
}

/* HEADER */
header {
    background-color: #111;
    padding: 30px;
    border-bottom: 1px solid #333;
    text-align: right;
}

.judul {
    font-family: "Courier New", monospace;
    font-size: 40px;
    color: #ffffff;
    margin: 0;
}

.subjudul {
    font-family: "Courier New", monospace;
    font-size: 60px;
    color: #a9a9a9;
    margin: 0;
}

/* ISI HALAMAN */
main {
    height: calc(100vh - 150px);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* KOTAK DROPDOWN */
.dropdown-box {
    background-color: #111;
    border: 2px solid #00ff00;
    padding: 30px;
    border-radius: 10px;
    text-align: center;    
    margin-top: 80px;    
}

.dropdown-box h2 {
    color: #ffd700;
    margin-bottom: 15px;
    font-family: "Courier New", monospace;
}

select {
    width: 250px;
    padding: 10px;
    font-size: 16px;
    font-family: "Courier New", monospace;
    background-color: #000;
    color: #fff;
    border: 1px solid #00ff00;
    border-radius: 5px;
    cursor: pointer;
}

select:focus {
    outline: none;
    border-color: #ffd700;
}
.footer-section {
    width: 500px;
    margin-top: 50px;
    text-align: center;
}

.footer-section hr {
    border: none;
    border-top: 1px solid #555;
    margin-bottom: 15px;
}

.footer-section p {
    color: #888;
    font-family: "Courier New", monospace;
    font-size: 14px;
}
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    /* 50% transparan gelap */
    background: rgba(0, 0, 0, 0.5);

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;
}

/* KOTAK DI TENGAH */
.overlay-box {
    width: 600px;
    height: 500px;
    max-width: 90%;
    padding: 40px;

    background: rgba(0, 0, 0, 0.5);
    border: 1px solid #00ff00;
    border-radius: 10px;

    text-align: center;
    font-family: "Courier New", monospace;
}

.overlay-box h2 {
    color: #ffd700;
    margin-bottom: 15px;
}

.overlay-box p {
    color: #fff;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 20px;
}

.overlay-box button {
    padding: 10px 25px;
    background: #1e90ff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.overlay-box button:hover {
    background: #00bfff;
}
.blink {
    color: red;
    animation: kedip 0.5s infinite;
}

@keyframes kedip {
    0% {
        color: red;
        opacity: 1;
    }

    50% {
        color: #ff6666;
        opacity: 0.3;
    }

    100% {
        color: red;
        opacity: 1;
    }
}
#typing::after {
    content: "|";
    color: #00ff00;
    animation: cursor 0.7s infinite;
}

@keyframes cursor {
    50% {
        opacity: 0;
    }
}
</style>
</head>
<body>
<div class="overlay" id="infoBox">
    <div class="overlay-box">
        <h2 class="blink">INFORMASI</h2>
        <p id="typing"></p>
        <button onclick="tutupInfo()">OK</button>
    </div>
</div>
<header>
    <h1 class="judul">WARMIE</h1>
    <h1 class="subjudul">ABANG-DEDE REBORN</h1>
</header>
<main>
    <div class="dropdown-box">
        <h2>PILIH MENU</h2>
        <select id="menuSelect" onchange="pilihMenu()">
    <option value="">-- Pilih Menu --</option>
    <option value="https://warmie7980.github.io/abangdede-reborn/index.html">
    WARMIE/ANEKA MIE
    <option value="https://warmie7980.github.io/abangdede-reborn/nasiuduk.html">
    WARUNG EMAK
</option>
</select>
    </div>
    <div class="footer-section">
        <hr>
        <p>
            © 2026 Warmie Abang-Dede Reborn, Petir, Cipondoh, Tangerang-Banten
        </p>
    </div>
</main>
<script>
function pilihMenu() {
    const menu = document.getElementById("menuSelect").value;

    if (menu !== "") {
        window.location.href = menu;
    }
}
</script>
<script>
function tutupInfo() {
    document.getElementById("infoBox").style.display = "none";
}
</script>
<script>
const text = "Selamat datang di WARMIE dengan ini kami sampaikan warmie mwmbuka donasi bagi yang ingin menyumbangkan sebagian rezekinya di hari Jum'at berkah ini";
let index = 0;

function ketik() {
    if (index < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(index);
        index++;
        setTimeout(ketik, 100); // kecepatan ketik
    }
}

ketik();
</script>
</body>
</html>
